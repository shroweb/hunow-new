services:
  postgres:
    image: postgres:16-alpine
    container_name: hull-navigator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hull_navigator
      POSTGRES_USER: hull
      POSTGRES_PASSWORD: hull_dev_password
    ports:
      - "55432:5432"
    volumes:
      - hull_navigator_postgres:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hull -d hull_navigator"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hull_navigator_postgres:
