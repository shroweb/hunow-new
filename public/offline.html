<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#080d2d" />
    <title>Offline — HU NOW</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #080d2d;
        --paper: #f5efe6;
        --accent: #e5ad33;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--paper);
        color: var(--ink);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      main {
        width: min(560px, 100%);
        border: 3px solid var(--ink);
        background: #fffaf1;
        padding: 32px;
      }
      .brand {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent);
      }
      h1 {
        margin: 12px 0;
        font-size: clamp(40px, 12vw, 72px);
        line-height: 0.9;
        text-transform: uppercase;
        letter-spacing: 0;
      }
      p {
        margin: 0;
        max-width: 36rem;
        font-size: 16px;
        line-height: 1.55;
      }
      a {
        display: inline-block;
        margin-top: 24px;
        border: 2px solid var(--ink);
        background: var(--ink);
        color: var(--paper);
        padding: 12px 18px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-decoration: none;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">HU NOW</div>
      <h1>You're offline</h1>
      <p>
        HU NOW needs a connection for fresh events, listings and offers. Cached pages may still be
        available from your browser history.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
